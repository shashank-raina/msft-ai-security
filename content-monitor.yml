name: AI Security Content Monitor

on:
  # Run every day at 07:00 UTC
  schedule:
    - cron: "0 7 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print findings, skip Issue creation)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  monitor:
    name: Scan Microsoft Learn for AI security updates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      issues: write   # needed to create Issues
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run content monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:       ${{ github.repository }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/content_monitor.py
